x-base-bot: &base-bot
  image: ghcr.io/tf2-automatic/bot:latest
  restart: unless-stopped
  depends_on:
    - rabbitmq
    - bot-manager
    - minio
    - app
  expose:
    - '3000'
  environment: &rmq-redis-env	
    REDIS_HOST: 'redis'
    REDIS_PORT: 6379
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    RABBITMQ_HOST: 'rabbitmq'
    RABBITMQ_PORT: 5672
    RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
    RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    RABBITMQ_VHOST: ''

volumes:
  rabbitmq:
  redis:
  minio:
  postgres:

services:
  rabbitmq:
    image: rabbitmq:3.9.28-management-alpine
    expose:
      - '5672'
    ports:
      - '127.0.0.1:15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - 'rabbitmq:/var/lib/rabbitmq'
    healthcheck:
      test: rabbitmq-diagnostics ping
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 30s
      start_interval: 10s

  minio:
    image: minio/minio:RELEASE.2023-02-17T17-52-43Z
    command: server /data --console-address ":9001"
    expose:
      - '9000'
    ports:
      - '127.0.0.1:9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - 'minio:/data'

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory-policy noeviction
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis:/data

  bot-manager:
    image: ghcr.io/tf2-automatic/bot-manager:latest
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    environment:
      <<: *rmq-redis-env

  bptf-manager:
    image: ghcr.io/tf2-automatic/bptf-manager:latest
    restart: unless-stopped
    ports:
      - '3002:3000'
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *rmq-redis-env

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tf2-automatic}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  item-service:
    image: ghcr.io/tf2-automatic/item-service:latest
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      bot-manager:
        condition: service_healthy
    ports:
      - '127.0.0.1:3003:3000'
    environment:
      <<: *rmq-redis-env
    env_file:
      - './bots/bot1.env'

  app:
    image: ghcr.io/price-o-tron/tf2-bot:master
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      bot-manager:
        condition: service_healthy
      postgres:
        condition: service_healthy
      item-service:
        condition: service_started
      bptf-manager:
        condition: service_started
    environment:
      <<: *rmq-redis-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tf2-automatic}
    ports:
      - '8080:3000'
    volumes:
      - './bots:/bot-envs:ro'

  # Copy this block for each bot you want to run, but make sure to change the name and the env_file
  bot1:
    <<: *base-bot
    container_name: bot-${BOT1}
    ports:
      - '3001:3000'
    env_file: 
      - './bots/bot1.env'